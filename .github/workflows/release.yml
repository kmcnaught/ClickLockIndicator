name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: dotnet build -c Release

      - name: Create release archive
        run: Compress-Archive -Path bin\Release\net472\ClickLockIndicator.exe -DestinationPath ClickLockIndicator-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClickLockIndicator-${{ github.ref_name }}.zip
